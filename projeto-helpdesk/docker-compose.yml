version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: helpdesk_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: helpdesk_db
    ports:
      - "5432:5432" # Mapeia a porta nativa do Postgres para a sua máquina
    volumes:
      - postgres_data:/var/lib/postgresql/data # Garante que os dados não somem ao desligar o PC

volumes:
  postgres_data:
